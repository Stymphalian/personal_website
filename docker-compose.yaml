services:
  shell:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ai-dev-tasks-shell
    volumes:
      - .:/workspace
      - /workspace/personal-blog/node_modules
      - /workspace/personal-blog/.vite
    environment:
      - NODE_ENV=development
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: /bin/bash
