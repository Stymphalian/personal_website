services:
  shell:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        USERNAME: ${USERNAME:-jordan}
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    container_name: ai-dev-tasks-shell
    user: ${USERNAME:-jordan}
    volumes:
      - .:/workspace
      - /workspace/personal-blog/node_modules
      - /workspace/personal-blog/.vite
    environment:
      - NODE_ENV=development
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: /bin/bash
